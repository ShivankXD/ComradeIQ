name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: comradeiq

jobs:
  verify:
    name: Lint, unit test, and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: comradeiq/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
